name: Feature request
description: Propose a general-purpose capability
title: "[Feature]: "
labels: [enhancement]
body:
    - type: textarea
      id: use-case
      attributes: { label: Use case, description: Explain consumers and why extension points are insufficient. }
      validations: { required: true }
    - type: textarea
      id: design
      attributes: { label: Proposed API and tradeoffs }
