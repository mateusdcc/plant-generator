name: Release

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    actions: write
    contents: write
    pull-requests: write
    issues: write
    statuses: write

jobs:
    release:
        runs-on: ubuntu-latest
        outputs:
            released: ${{ steps.release.outputs.release_created }}
            tag: ${{ steps.release.outputs.tag_name }}
        steps:
            - uses: googleapis/release-please-action@v5
              id: release
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json
            - name: Validate the release pull request
              if: steps.release.outputs.prs_created == 'true'
              env:
                  GH_TOKEN: ${{ github.token }}
                  RELEASE_PRS: ${{ steps.release.outputs.prs }}
              run: |
                  branch="$(jq -r '.[0].headBranchName // empty' <<<"$RELEASE_PRS")"
                  number="$(jq -r '.[0].number // empty' <<<"$RELEASE_PRS")"
                  test -n "$branch" && test -n "$number"
                  head_sha="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$number" --jq .head.sha)"
                  gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"
                  gh workflow run docs.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"

                  find_run() {
                      local workflow="$1"
                      local run_id=""
                      for _ in {1..15}; do
                          run_id="$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "$workflow" --branch "$branch" --event workflow_dispatch --limit 10 --json databaseId,headSha --jq "map(select(.headSha == \"$head_sha\"))[0].databaseId // empty")"
                          if test -n "$run_id"; then
                              printf '%s\n' "$run_id"
                              return 0
                          fi
                          sleep 2
                      done
                      return 1
                  }

                  ci_run="$(find_run ci.yml)"
                  docs_run="$(find_run docs.yml)"
                  gh run watch "$ci_run" --repo "$GITHUB_REPOSITORY" --exit-status
                  gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$head_sha" -f state=success -f context=verify -f description="Release candidate CI passed" -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$ci_run"
                  gh run watch "$docs_run" --repo "$GITHUB_REPOSITORY" --exit-status
                  gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$head_sha" -f state=success -f context=build -f description="Release candidate documentation passed" -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$docs_run"

    publish:
        if: needs.release.outputs.released == 'true'
        needs: release
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ needs.release.outputs.tag }}
            - uses: actions/setup-node@v7
              with:
                  node-version: 24
                  cache: npm
                  registry-url: https://registry.npmjs.org
            - run: npm install --global npm@latest
            - run: npm ci
            - run: npm run verify
            - name: Verify tag and package version
              run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"
            - run: npm publish --access public
